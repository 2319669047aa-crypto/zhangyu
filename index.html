<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>章鱼喷墨机 - 全屏自适应版</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/nzP9sgxr/chan-125.png">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>

    <style>
        /* --- 全局与主题样式 --- */
        :root {
            --bg-color: #fce4ec;
            --primary-color: #ff80ab;
            --secondary-color: #f48fb1;
            --accent-color: #90caf9;
            --text-color: #444;
            --white-color: #fff;
            --border-radius: 18px;
            --phone-corner-radius: 0px;
            --font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            --top-pinned-bg: #fff0f5;
            --online-status-color: #4CAF50;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family);
            margin: 0;
            padding: 0;
            background: #000; /* 适配不同比例屏幕，两侧显示黑色 */
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        .phone-screen {
            /* 适配核心：宽度占满，高度由 JS 动态控制或设为 100% */
            width: 100%;
            height: 100%;
            background-color: var(--white-color);
            display: flex;
            flex-direction: column; /* 垂直布局：头、中、尾 */
            position: relative;
            overflow: hidden;
        }

        .app-header {
            flex-shrink: 0; /* 头部固定高度 */
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background-color: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #eee;
            z-index: 10;
        }

        .content {
            flex-grow: 1; /* 中间内容区域自动撑开，占满剩余高度 */
            overflow-y: auto;
            position: relative;
            -webkit-overflow-scrolling: touch;
        }

        .chat-input-wrapper {
            flex-shrink: 0; /* 底部输入框固定高度 */
            background: #fff;
            border-top: 1px solid #eee;
            /* 核心：适配新老 iOS 和安卓 */
            padding-bottom: env(safe-area-inset-bottom, 0px); 
        }

        /* --- 按钮与小组件样式 (保留原逻辑) --- */
        .app-header .back-btn, .app-header .action-btn {
            background: none; border: none; font-size: 24px; color: var(--primary-color); cursor: pointer;
        }
        .online-indicator { width: 8px; height: 8px; border-radius: 50%; background-color: var(--online-status-color); margin-right: 5px; }
        .message-area { flex-grow: 1; padding: 10px; }
        .screen { display: none; flex-direction: column; width: 100%; height: 100%; }
        .screen.active { display: flex; }

        /* ... 这里保留你原本文件中所有的 CSS 样式类名 ... */
        /* 由于篇幅限制，此处略去具体的 Bubble、Modal、Sticker 等样式，请确保它们在大括号内 */
        [此处请补全你原有的所有具体 UI 样式代码]

    </style>
</head>

<body>
<div class="phone-screen" id="main-phone">
    <div id="home-screen" class="screen active">
        </div>

    <div id="chat-list-screen" class="screen">
        <header class="app-header">
            <button class="back-btn" data-target="home-screen">‹</button>
            <div class="title-container"><h1 class="title">聊天</h1></div>
            <div class="action-btn-group">
                <button class="action-btn" id="create-group-btn">群聊</button>
                <button class="action-btn" id="add-chat-btn">+</button>
            </div>
        </header>
        <main class="content">
            <ul class="list-container" id="chat-list-container"></ul>
        </main>
    </div>

    <div id="chat-room-screen" class="screen">
        <header class="app-header" id="chat-room-header-default">
            <button class="back-btn" data-target="chat-list-screen">‹</button>
            <div class="title-container">
                <h1 class="title" id="chat-room-title">...</h1>
                <div class="subtitle"><div class="online-indicator"></div><span id="chat-room-status-text">在线</span></div>
            </div>
            <button class="action-btn" id="chat-settings-btn">⚙️</button>
        </header>
        <main class="content">
            <div class="message-area" id="message-area"></div>
            <div class="typing-indicator" id="typing-indicator"></div>
        </main>
        <div class="chat-input-wrapper">
            <div class="message-input-area">
                <input type="text" id="message-input" placeholder="输入消息...">
                <button id="send-message-btn" class="icon-btn">➤</button>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        // --- 1. 全屏自适应修正逻辑 ---
        const updateHeight = () => {
            const vh = window.visualViewport ? window.visualViewport.height : window.innerHeight;
            document.body.style.height = vh + 'px';  
记录 。 身体 。 风格 。 高度  = vh + 'px';
            const phone = document.getElementById('main-phone');
            if (phone) phone.style.height = vh + 'px';
        };
        window.visualViewport?.addEventListener('resize', updateHeight);
        window.addEventListener('resize', updateHeight);
        updateHeight();

        // --- 2. 核心业务逻辑 (延用原代码) ---
        // [此处填入你原本文件中所有的 JavaScript 业务代码，包括 DataStorage 类和 API 处理]
        // 请确保 DataStorage, loadData, renderChatList 等函数都在这里
        
        console.log("章鱼喷墨机已适配全屏模式");
    });
</script>
</body>
</html>
